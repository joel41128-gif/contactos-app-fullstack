<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Directorio de Contactos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background: #f5f5f5;
        }
        h1 { text-align: center; color: #333; }
        .contenedor {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        #buscador {
            padding: 12px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        ul { list-style: none; padding: 0; }
        li {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info { flex: 1; }
        .categoria {
            font-size: 12px;
            color: white;
            background: #888;
            padding: 2px 8px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Directorio de Contactos</h1>

    <input type="text" id="buscador" placeholder="🔍 Buscar contacto por nombre..." oninput="buscarContactos()">

    <div class="contenedor">
        <h3>Agregar nuevo contacto</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="email" id="email" placeholder="Email">
        <select id="categoria">
            <option value="Familia">Familia</option>
            <option value="Trabajo">Trabajo</option>
            <option value="Amigo">Amigo</option>
            <option value="Otro">Otro</option>
        </select>
        <button onclick="crearContacto()">Agregar contacto</button>
    </div>

    <ul id="listaContactos"></ul>

    <script>
        const API_URL = "http://localhost:8081/contactos";

        async function cargarContactos(textoBusqueda = "") {
            const respuesta = await fetch(`${API_URL}?buscar=${textoBusqueda}`);
            const contactos = await respuesta.json();

            const lista = document.getElementById("listaContactos");
            lista.innerHTML = "";

            contactos.forEach(contacto => {
                const li = document.createElement("li");

                const info = document.createElement("div");
                info.className = "info";
                info.innerHTML = `
                    <strong>${contacto.nombre}</strong><br>
                    📞 ${contacto.telefono} &nbsp; ✉️ ${contacto.email}
                `;

                const categoria = document.createElement("span");
                categoria.className = "categoria";
                categoria.textContent = contacto.categoria;

                const btnBorrar = document.createElement("button");
                btnBorrar.textContent = "🗑️";
                btnBorrar.style.width = "auto";
                btnBorrar.style.marginLeft = "10px";
                btnBorrar.onclick = () => borrarContacto(contacto.id);

                li.appendChild(info);
                li.appendChild(categoria);
                li.appendChild(btnBorrar);
                lista.appendChild(li);
            });
        }

        function buscarContactos() {
            const texto = document.getElementById("buscador").value;
            cargarContactos(texto);
        }

        async function crearContacto() {
            const nombre = document.getElementById("nombre").value.trim();
            const telefono = document.getElementById("telefono").value.trim();
            const email = document.getElementById("email").value.trim();
            const categoria = document.getElementById("categoria").value;

            if (nombre === "") return;

            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre, telefono, email, categoria })
            });

            document.getElementById("nombre").value = "";
            document.getElementById("telefono").value = "";
            document.getElementById("email").value = "";

            cargarContactos();
        }

        async function borrarContacto(id) {
            await fetch(`${API_URL}?id=${id}`, { method: "DELETE" });
            cargarContactos();
        }

        cargarContactos();
    </script>
</body>
</html>
